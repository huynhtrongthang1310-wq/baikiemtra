<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Thành Viên</title>
    <style>
        body { font-family: sans-serif; margin: 40px; text-align: center; }
        .login-form { border: 1px solid #ccc; padding: 20px; display: inline-block; background: #f9f9f9; border-radius: 5px; }
        input { margin: 10px 0; padding: 8px; width: 200px; }
        button { padding: 8px 15px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>ĐĂNG NHẬP THÀNH VIÊN</h2>
    
    <div class="login-form">
        <form onsubmit="alert('Đăng nhập thành công!'); window.location.href='index.html'; return false;">
            <input type="text" placeholder="Tên đăng nhập" required><br>
            <input type="password" placeholder="Mật khẩu" required><br>
            <button type="submit">Đăng nhập</button>
        </form>
    </div>

    <p><a href="index.html">← Quay lại Trang chủ</a></p>

</body>
</html>
