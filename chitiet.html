<section class="comment-section">
    <h3>Bình luận công khai</h3>
    <form id="commentForm">
        <input type="text" id="commentName" placeholder="Tên của bạn" required><br>
        <textarea id="commentContent" placeholder="Viết bình luận tại đây..." required></textarea><br>
        <button type="submit">Gửi bình luận</button>
    </form>
    
    <div id="commentList">
        <!-- Bình luận mới sẽ tự động hiển thị ở đây nhờ Jquery -->
    </div>
</section>
